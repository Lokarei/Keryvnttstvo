name: Build LaTeX Document

on:
  push:
    branches: [ "main" ] # Замените на master, если ваша основная ветка называется так
  pull_request:
    branches: [ "main" ]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      # 1. Загрузка файлов из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Компиляция PDF с принудительными прогонами для Оглавления
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          # Главный файл проекта
          root_file: main.tex
          # Движок компиляции
          compiler: pdflatex
          # -n 3 заставляет систему прогнать компиляцию 3 раза для создания Оглавления
          # -interaction=nonstopmode позволяет игнорировать мелкие предупреждения
          args: "-interaction=nonstopmode -halt-on-error -file-line-error -n 3"

      # 3. Сохранение готового PDF в артефакты GitHub
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keryvnttstvo-Instruction
          path: main.pdf
