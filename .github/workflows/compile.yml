name: Compile Keryvnttstvo Project
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args: "-interaction=nonstopmode -halt-on-error -file-line-error -n 3"

      - name: Save PDF
        uses: actions/upload-artifact@v4
        with:
          name: Keryvnttstvo_Instruction_PDF
          path: main.pdf
