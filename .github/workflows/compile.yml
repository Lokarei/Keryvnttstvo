name: Compile Keryvnttstvo Project
on: [push] # Запускать сборку при каждом обновлении файлов

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Optimize and Resize Images (Спосіб 1 + 2)
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick optipng
          if [ -d "images" ]; then
            echo "Папка images знайдена. Запускаємо повну оптимізацію..."
            
            # Спосіб 2: Зменшуємо роздільну здатність (тільки якщо ширина більша за 1200px) та оптимізуємо вагу
            find images/ -name "*.png" -exec convert {} -resize "1200x>" -quality 85% {} \;
            
            # Спосіб 1: Додатково стискаємо палітру без втрати якості ліній
            find images/ -name "*.png" -exec optipng -o2 {} \;
            
            echo "Оптимізацію завершено."
          else
            echo "Папка images не знайдена, пропускаємо крок."
          fi

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex # Путь к вашему главному файлу

      - name: Save PDF
        uses: actions/upload-artifact@v4
        with:
          name: Keryvnttstvo_Instruction_PDF
          path: main.pdf           # Файл, который нужно сохранить
