name: Build LaTeX Document

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: pdflatex
          args: "-interaction=nonstopmode -halt-on-error -file-line-error -n 3"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keryvnttstvo-Instruction
          path: main.pdf
