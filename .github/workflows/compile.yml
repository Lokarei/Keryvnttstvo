
name: Compile Keryvnttstvo Project
on: [push] # Запускать сборку при каждом обновлении файлов

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex # Путь к вашему главному файлу
          # Добавляем 3 прохода сборки для генерации Оглавления
          args: "-interaction=nonstopmode -halt-on-error -file-line-error -n 3"

      - name: Save PDF
        uses: actions/upload-artifact@v4
        with:
          name: Keryvnttstvo_Instruction_PDF # Имя архива с результатом
          path: main.pdf
